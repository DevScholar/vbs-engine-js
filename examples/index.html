    <script type="text/vbscript">
    ' Shared variable from VBScript
    sharedMessage = "Hello from VBScript!"

    Sub BtnMsgBox_OnClick()
        MsgBox "This is a VBScript MsgBox!", 64, "Demo"

    Sub BtnMsgBoxYesNo_OnClick()
        result = MsgBox("Do you like VBScript?", 4 + 32, "Yes/No Test")
        If result = 6 Then
            MsgBox "You clicked Yes!", 64, "Result"
        ElseIf result = 7 Then
            MsgBox "You clicked No!", 64, "Result"
        End If
    End Sub
    
    Sub BtnMsgBoxYesNoCancel_OnClick()
        result = MsgBox("Save changes before closing?", 3 + 48, "Yes/No/Cancel Test")
        If result = 6 Then
            MsgBox "You clicked Yes - Saving!", 64, "Result"
        ElseIf result = 7 Then
            MsgBox "You clicked No - Discarding!", 64, "Result"
        ElseIf result = 2 Then
            MsgBox "You clicked Cancel!", 64, "Result"
        End If
    End Sub
    
    Sub BtnMsgBoxAbortRetryIgnore_OnClick()
        result = MsgBox("File operation failed!", 2 + 16, "Abort/Retry/Ignore Test")
        If result = 3 Then
            MsgBox "You clicked Abort!", 64, "Result"
        ElseIf result = 4 Then
            MsgBox "You clicked Retry!", 64, "Result"
        ElseIf result = 5 Then
            MsgBox "You clicked Ignore!", 64, "Result"
        End If
    End Sub
    
    Sub BtnInputBox_OnClick()
        name = InputBox("Enter your name:", "Input", "User")
        If name <> "" Then
            MsgBox "Hello, " & name & "!", 64, "Welcome"
        End If
    End Sub
    
    Sub BtnSetVbs_OnClick()

        document.getElementById("sharedOutput").innerHTML = "VBS set: sharedMessage = " & sharedMessage
    End Sub
    
    Sub BtnReadJs_OnClick()
        MsgBox "JS variable: " & jsVar, 64, "From JS"
    End Sub

    End Sub
    
    Sub BtnReadVbs_OnClick()

    End Sub
    
    Sub Window_OnLoad()
    End Sub

    <script type="text/vbscript">
' ===== VBScript Section =====
Dim vbsMessage
vbsMessage = "Hello from VBS"

' Function to read JS variable
Function ReadJSMessage()
    On Error Resume Next
    ReadJSMessage = window.jsMessage
    If Err.Number <> 0 Then ReadJSMessage = "Read failed"
End Function

' Display result
Sub ShowResult()
    Dim result, jsMsg
    jsMsg = ReadJSMessage()
    result = "VBS reads JS: " & jsMsg & "<br>"
    result = result & "JS reads VBS: Waiting for JS display..." & "<br>"
    document.getElementById("result").innerHTML = result
End Sub

' Delayed execution to ensure JS is loaded
Sub Window_OnLoad()
    window.setTimeout "ShowResult()", 100, "VBScript"
    Call UpdateClock()
    timerID = window.setInterval("UpdateClock", 1000, "VBScript")
End Sub
</script>

    <script type="text/javascript">
        // ===== JavaScript Section =====
        var jsMessage = "Hello from JS";

        // Function to read VBS variable
        function readVBSMessage() {
            try {
                if (typeof vbsMessage !== 'undefined') {
                    return vbsMessage;
                }
                return "Read failed";
            } catch (e) {
                return "Read failed";
            }
        }

        // Display final result
        function showFinalResult() {
            var vbsMsg = readVBSMessage();
            var resultDiv = document.getElementById("result");
            var current = resultDiv.innerHTML;

            resultDiv.innerHTML = current.replace("Waiting for JS display...", vbsMsg);
        }

        // Delayed execution to ensure VBS is running
        window.setTimeout(showFinalResult, 200);
    </script>

    <script type="text/vbscript">
Option Explicit

Dim timerID

' Main function: update clock display
Sub UpdateClock()
    Dim nowTime, hours, minutes, seconds, timeString
    nowTime = Now()
    
    hours = FormatTimePart(Hour(nowTime))
    minutes = FormatTimePart(Minute(nowTime))
    seconds = FormatTimePart(Second(nowTime))
    
    timeString = hours & ":" & minutes & ":" & seconds
    document.getElementById("clock").innerHTML = timeString
End Sub

' Helper function: format time part (zero-pad)
Function FormatTimePart(timePart)
    If Len(timePart) = 1 Then
        FormatTimePart = "0" & CStr(timePart)
    Else
        FormatTimePart = CStr(timePart)
    End If
End Function

</script>
